<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Profil Terkunci</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background-color: #2d2d2d;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: none;
            box-sizing: border-box;
            text-align: center;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        #unlock-btn {
            background-color: #4CAF50;
            color: white;
        }
        #unlock-btn:hover { background-color: #45a049; }
        
        #guest-btn {
            background-color: #555;
            color: white;
        }
        #guest-btn:hover { background-color: #777; }

        #error-msg {
            color: #ff5252;
            display: none;
            margin-top: 15px;
        }
        #guest-instruction {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #3d3d3d;
            border-left: 4px solid #2196F3;
            border-radius: 4px;
            font-size: 14px;
            text-align: left;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="margin-top: 0;">Profil Terkunci</h2>
        <p style="color: #bbb; margin-bottom: 20px;">Silakan masukkan kunci atau gunakan Mode Tamu.</p>
        
        <input type="password" id="password-input" placeholder="Masukkan Sandi Profil">
        
        <div class="btn-group">
            <button id="unlock-btn">Buka Kunci</button>
            <button id="guest-btn">Login dengan User Tamu</button>
        </div>

        <p id="error-msg">Sandi Salah!</p>
        
        <div id="guest-instruction">
            <strong>Cara menggunakan Mode Tamu:</strong><br>
            1. Klik <b>Ikon Profil (Foto)</b> di pojok kanan atas browser.<br>
            2. Klik menu <b>Tamu Guest (Buka Profil Tamu)</b>.<br>
            3. Jendela Chrome baru yang bersih akan terbuka untuk Anda.
        </div>
    </div>

    <script src="kunci.js"></script>
</body>
</html>
